<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - Form HTML</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/table-form.css" />
</head>
<body>
    <section class="container">
        <form class="form">
            <div class="form-control">
                <label for="username" class="form-label">Username</label>
                <input id="username" type="text" class="form-input" />
            </div>
            <div class="form-control">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-input" />
            </div>
            <div class="from-control">
                <label class="form-label" for="email"> Email </label>
                <input type="email" class="form-input" id="email" />
            </div>
            <div class="from-control">
                <label class="form-label" for="phone"> Phone </label>
                <input type="number" class="form-input" id="phone" />
            </div>
            <div class="from-control">
                <label class="form-label" for="url"> URL </label>
                <input type="url" class="form-input" id="url" />
            </div>
            <div class="from-control">
                <label class="form-label" for="time"> Time </label>
                <input type="month" class="form-input" id="time" />
            </div>
            <div class="from-control">
                <label class="form-label" for="color"> Color </label>
                <input type="color" class="form-input" id="color" />
            </div>
            <div class="from-control">
                <label class="form-label" for="area"> Text Area </label>
                <textarea id="area" rows="10"></textarea>
            </div>
            <div class="from-control">
                <label class="form-label" for="gender"> Gender </label>
                <select class="form-input" id="gender">
                    <option value="0"> Femal </option>
                    <option value="1"> Male </option>
                    <option value=""> Custom </option>
                </select>
            </div>
            <div class="form-control">
                <label for="age"> 10 - 20 age </label>
                <input type="checkbox" value="10-20" checked />
                <br/>
                <label for="age1"> 20 - 30 age </label>
                <input type="checkbox" value="20-30" />
            </div>
            <div class="form-control">
                <label for="HN"> Ha Noi</label>
                <input type="radio" name="address" />
                <br/>
                <label for="DN"> Da Nang</label>
                <input type="radio" name="address" />
                <br/>
                <label for="HCM"> TP HCM</label>
                <input type="radio" name="address" />
            </div>
            <button type="submit" class="btn" style="margin-top: 20px;"> Submit</button>
        </form>
    </section>
</body>
</html>
