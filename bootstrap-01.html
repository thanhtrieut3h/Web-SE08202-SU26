<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 01</title>
    <!-- su dung bootstrap offline -->
    <link href="bootstrap/css/bootstrap.css" rel="stylesheet" />

    <!-- su dung bootstrap online -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <style>
        .box, .box-1, .box-2 {
            height: 100%;
        }
        .box {
            background-color: yellow;
        }
        .box-1 {
            background-color: blue;
        }
        .box-2 {
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- phai co row thi moi chia dc cac cot -->
            <div class="box col-12 col-sm-12 col-md-4 col-lg-6 offset-md-3 col-xl-12"> col 1 </div>
            <div class="box-1 col-12 col-sm-12 col-md-4 col-lg-6 col-xl-12"> col 2</div>
            <div class="box-2 col-12 col-sm-12 col-md-4 col-lg-6 col-xl-12"> col 3</div>
        </div>
        <div class="row">
            <div class="box col-sm-12 col-md-12 col-lg-6"> Column 01</div>
            <div class="box-1 col-sm-12 col-md-12 col-lg-6"> Column 02</div>
        </div>
    </div>
</body>
</html>
